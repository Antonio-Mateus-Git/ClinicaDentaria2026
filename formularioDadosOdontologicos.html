<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Dentária: Sorriso Real</title>
    <link rel="shortcut icon" href="../images/AIRetouch_20260520_162007909.png" type="image/x-icon">
    <style>
        .subConteudoSite{
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: #000000be;
            align-items: center;
            justify-content: center;
        }
        .container1{
            color: white;
            display: flex;
            flex-direction: column;
            padding: 20px;
            border: 2px solid #ffffff3d;
            border-radius: 20px;
            background-color: #00000050;
            backdrop-filter: blur(5px);
            width: 60%;
            transform: scale(.7);
        }
        .container1 > h1{
            text-align: center;
            margin-bottom: 30px;
        }
        .container1 > form{
            width: 100%;
            display: flex;
            font-size: 1.2rem;
            flex-direction: column;
            gap: 10px;
        }
        #button{
            padding: 10px 60px;
            border: 2px solid white;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            transition-duration: 1s;
            margin-top: 20px;
        }
        #button:hover{
            background-color: #ffffff3d;
            color: #ffffff;
        }
        .container1 > form  input, select{
            padding: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
            transition-duration: 2s;
            font-size: 1.2rem;
        }
        input:focus, select:focus{
            box-shadow: 0px 0px 5px rgb(0, 255, 72);
        }
        .container1 > form > select{
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
        }
        .mostrar{
            transform: scale(1);
        }
    </style>
</head>
<body>
    <div class="subConteudoSite" id="dadosOdontologicos">
        <div class="container1" id="containerDadosOdontologicos">
            <h1>Dados Odontológicos</h1>
            <form id="formularioOdontologico">
                <label for="QueixaP">Queixa principal</label>
                <select name="QueixaP" id="QueixaP">
                    <option value="" selected disabled>Escolher opção (Obrigatório)</option>
                    <option value="Dor no molar">Dor no molar</option>
                    <option value="Sensibilidade">Sensibilidade</option>
                    <option value="Outra">Outra</option>
                </select>
                <label for="aparelho">Uso de aparelho?</label>
                <select name="aparelho" id="aparelho">
                    <option value="" selected disabled>Escolher opção (Obrigatório)</option>
                    <option value="Sim">Sim</option>
                    <option value="Não">Não</option>
                </select>
                <label for="Sensibilidade">Sensibilidade dentária?</label>
                <select name="Sensibilidade" id="Sensibilidade">
                    <option value="" selected disabled>Escolher opção (Obrigatório)</option>
                    <option value="Sim">Sim</option>
                    <option value="Não">Não</option>
                </select>
                <label for="sangramento">Sangramento gengival?</label>
                <select name="sangramento" id="sangramento">
                    <option value="" selected disabled>Escolher opção (Obrigatório)</option>
                    <option value="Sim">Sim</option>
                    <option value="Não">Não</option>
                </select>
                <label for="carie">Histórico de cáries frequentes?</label>
                <select name="sangramento" id="sangramento">
                    <option value="" selected disabled>Escolher opção (Obrigatório)</option>
                    <option value="Sim">Sim</option>
                    <option value="Não">Não</option>
                </select>
                <button type="submit" id="button">Cadastrar</button>
            </form>
        </div>
    </div>
</body>
</html>
