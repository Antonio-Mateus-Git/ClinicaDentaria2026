<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Dentária: Sorriso Real</title>
    <link rel="stylesheet" href="../styles/estiloGlobal.css">
    <link rel="shortcut icon" href="../images/AIRetouch_20260520_162007909.png" type="image/x-icon">
    <style>
        body{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
        }
        body > h1{
            text-align: center;
            display: flex;
        }
        form{
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 20px;
        }
        form > input, form > select, form > button{
            padding: 10px;
            border-radius: 10px;
            font-size: 1.1rem;
            border: none;
            outline: none;
            background-color: #00000010;
        }
        span{
            display: flex;
            align-items: center;
            justify-content: center;
        }
        span > img{
            width: 50px;
            height: 40px;
        }
    </style>
</head>
<body>
    <h1>Clínica Dentária <span><img src="../images/AIRetouch_20260520_162007909.png" alt="">Real</span>: Fazer login</h1>
    <div class="container-tela-login">
        <form action="" method="post">
            <label for="email">E-mail: </label>
            <input type="email" name="email" id="email" placeholder="exemploemail@gmail.com">
            <label for="senha">Palavra Passe: </label>
            <input type="text" name="senha" id="senha" placeholder="mínimo 8 caracteres...">
            <label for="tipoAcesso">Escolher tipo de acesso</label>
            <select name="tipoAcesso" id="tipoAcesso">
                <option disabled selected>Tipos de acesso...</option>
                <option value="Paciente">Paciênte</option>
                <option value="Recepcionista">Recepcionísta</option>
                <option value="Dentista">Dentísta</option>
                <option value="ADM">ADM do sistema</option>
            </select>
            <label for="regraAcesso"><input type="checkbox" name="regraAcesso" id="regraAcesso">Por questões de segurança a sua sessão tera uma duração de 01h:30min. Após o termini do tempo a sessão será encerrada automaticamente.</label>
            <button type="submit" id="btn-submit">Entrar</button>
        </form>
    </div>
</body>
</html>
