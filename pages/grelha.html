<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grelha Animada</title>

<style>

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    height: 100vh;
    overflow: hidden;

    background-color: #050816;

    position: relative;
}

/* Fundo da grelha */
.grid{
    position: absolute;

    width: 200%;
    height: 200%;

    background-image:

    linear-gradient(rgba(0, 82, 82, 0.995) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 255, 255, 0.689) 1px, transparent 1px);

    background-size: 50px 50px;

    transform: perspective(500px) rotateX(0deg);

    animation: mover 10s linear infinite;
}

/* Movimento da grelha */
@keyframes mover{
    0%{
        transform: perspective(500px) rotateX(65deg) translateY(0);
    }

    100%{
        transform: perspective(500px) rotateX(65deg) translateY(50px);
    }
}

.conteudo{
    position: relative;
    z-index: 1;

    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    color: cyan;

    font-size: 40px;
    font-family: Arial;
}

</style>
</head>

<body>

<div class="grid"></div>

<div class="conteudo">
    Sistema Futurista
</div>

</body>
</html>
