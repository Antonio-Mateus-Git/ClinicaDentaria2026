<head>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

 
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body{
            
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(
135deg,
#eff6ff,
#f8fafc,
#dbeafe
);
                    min-height:100vh;
        }
        body > h1{

            text-align: center;
            display: flex;
        }
        
        h1,h2,h3{
    font-weight: 700;
    letter-spacing: -1px;
}
        form{
            display: flex;
            justify-content: space-between;
            background: white;

    border-radius: 24px;
                width: 800px;
    padding: 40px;

    box-shadow:
    0 20px 60px rgba(15,23,42,0.08);

    border: 1px solid #e2e8f0;
        

        }
        form input, form select, form  button{
            padding: 10px;
            border-radius: 10px;
            font-size: 1.1rem;
            border: none;
            outline: none;
            background-color: #00000010;
            font-family: 'Inter', sans-serif;
        }
        
        form  button{
           background: rgb(60, 151, 60);

    color: white;

    font-weight: 600;
margin-top: 20px;
    cursor: pointer;
    padding: 15px;
    border-radius: 14px;
border: none;
    transition: 0.3s ease;
        }
        form button:hover{
    background: #6ab68f;

    transform: translateY(-2px);
}
       form input, form select{

         padding:16px;

    border-radius:14px;

    border:1.5px solid #dbeafe;

    background:white;

    transition:0.3s ease;

    font-size:1rem;

        }
        input:focus,
select:focus{

    border-color:#2563eb;

    box-shadow:
    0 0 0 4px rgba(37,99,235,0.15);
}
            label{
                 margin-top:8px;
    font-weight: 600;
    color: #334155;}

        .part01, .part02{
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 45%;
        }
        .erro{
    color:#ef4444;
    font-size:14px;
    margin-top:4px;
    display:block;
}

    </style>
</head>
<body>
    <h1> Cadastro de Paciênte</h1>
    <div class="formularioCAdastroPaciente">
        <form method="post" id="formulario">
            <div class="part01">
                <label for="nomeCompleto">Nome Completo: </label>
                <input type="text" name="nomeCompleto" id="nomeCompleto" placeholder="xxx xxx">
                <label for="email">E-mail: </label>
                <input type="email" name="email" id="email" required placeholder="exemploemail@gmail.com">
                <label for="genero">Gênero: </label>
                <select name="genero" id="genero">
                    <option value="" disabled selected>Escolher Gênero...</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Feminino">Feminino</option>
                </select>
                <label for="tipoUsuario">Tipo de Usuário: </label>
                <select name="tipoUsuario" id="tipoUsuario" required>
                    <option value="Administrador" disabled>Administrador</option>
                    <option value="Paciente" selected>Paciênte</option>
                    <option value="Dentista" disabled>Dentista</option>
                    <option value="Recepcionista" disabled>Recepcionísta</option>
                </select>
                <label for="dataNascimento">Data de Nascimento: </label>
                <input type="date" name="dataNascimento" id="dataNascimento" required>
            </div>
            <div class="part02">
                <label for="telefone">Número Telefônico: </label>
                <input type="tel" name="telefone" id="telefone" required placeholder="900 000 000">
                <label for="morada">Endereço/Morada: </label>
                <input type="text" name="morada" id="morada" required placeholder="quinta avenida">
                <label for="senha">Criar Senha: </label>
                <input type="password" name="senha" id="senha" required placeholder="mínimo 8 caracteres...">
                <label for="senhaConf">Confirmar Senha: </label>
                <input type="password" name="senhaConf" id="senhaConf" required placeholder="confirmar senha...">
                <button type="submit" id="cadastro">Cadastrar Paciênte</button>
            </div>
        </form>
    </div>
    <script>
const form = document.getElementById("formulario");

const nomeCompleto = document.getElementById("nomeCompleto");
const email = document.getElementById("email");
const genero = document.getElementById("genero");
const tipoUsuario = document.getElementById("tipoUsuario");
const dataNascimento = document.getElementById("dataNascimento");
const telefone = document.getElementById("telefone");
const morada = document.getElementById("morada");
const senha = document.getElementById("senha");
const senhaConf = document.getElementById("senhaConf");

form.addEventListener("submit", function(event){

    event.preventDefault();

    limparErros();

    let cadastroValido = true;

    // Nome Completo
    if(nomeCompleto.value.trim() === ""){
        mostraErro(nomeCompleto, "O nome completo é obrigatório.");
        cadastroValido = false;
    }
    else if(nomeCompleto.value.trim().split(" ").length < 2){
        mostraErro(nomeCompleto, "Digite nome e sobrenome.");
        cadastroValido = false;
    }

    // Email
    if(email.value.trim() === ""){
        mostraErro(email, "O e-mail é obrigatório.");
        cadastroValido = false;
    }
    else if(!validarEmail(email.value)){
        mostraErro(email, "Digite um e-mail válido.");
        cadastroValido = false;
    }

    // Género
    if(genero.value === ""){
        mostraErro(genero, "Escolha um género.");
        cadastroValido = false;
    }

    // Data de nascimento
    if(dataNascimento.value === ""){
        mostraErro(dataNascimento, "A data de nascimento é obrigatória.");
        cadastroValido = false;
    }
    else{

        const hoje = new Date();
        const nascimento = new Date(dataNascimento.value);

        let idade = hoje.getFullYear() - nascimento.getFullYear();

        const mesAtual = hoje.getMonth();
        const mesNascimento = nascimento.getMonth();

        if(
            mesAtual < mesNascimento ||
            (
                mesAtual === mesNascimento &&
                hoje.getDate() < nascimento.getDate()
            )
        ){
            idade--;
        }

        if(idade < 0 || idade > 120){
            mostraErro(dataNascimento, "Data de nascimento inválida.");
            cadastroValido = false;
        }
    }

    // Telefone
    const telefoneLimpo = telefone.value.replace(/\D/g, "");

    if(telefone.value.trim() === ""){
        mostraErro(telefone, "O telefone é obrigatório.");
        cadastroValido = false;
    }
    else if(telefoneLimpo.length < 9){
        mostraErro(telefone, "Digite um telefone válido.");
        cadastroValido = false;
    }

    // Morada
    if(morada.value.trim() === ""){
        mostraErro(morada, "A morada é obrigatória.");
        cadastroValido = false;
    }
    else if(morada.value.trim().length < 5){
        mostraErro(morada, "Digite uma morada válida.");
        cadastroValido = false;
    }

    // Senha
    if(senha.value.trim() === ""){
        mostraErro(senha, "A senha é obrigatória.");
        cadastroValido = false;
    }
    else if(
        !/(?=.*[A-Z])(?=.*[a-z])(?=.*\d).{8,}/.test(senha.value)
    ){
        mostraErro(
            senha,
            "A senha deve ter pelo menos 8 caracteres, uma letra maiúscula e um número."
        );
        cadastroValido = false;
    }

    // Confirmar senha
    if(senhaConf.value.trim() === ""){
        mostraErro(senhaConf, "Confirme a senha.");
        cadastroValido = false;
    }
    else if(senha.value !== senhaConf.value){
        mostraErro(senhaConf, "As senhas não coincidem.");
        cadastroValido = false;
    }

    if(cadastroValido){
        alert("Paciente cadastrado com sucesso!");
        form.submit();
    }

});

function mostraErro(campo, mensagem){

    campo.style.border = "2px solid #ef4444";

    const erro = document.createElement("span");

    erro.className = "erro";
    erro.textContent = mensagem;

    erro.style.color = "#ef4444";
    erro.style.fontSize = "14px";
    erro.style.marginTop = "4px";
    erro.style.display = "block";

    campo.parentNode.appendChild(erro);
}

function limparErros(){

    document
        .querySelectorAll(".erro")
        .forEach(erro => erro.remove());

    const campos = [
        nomeCompleto,
        email,
        genero,
        tipoUsuario,
        dataNascimento,
        telefone,
        morada,
        senha,
        senhaConf
    ];

    campos.forEach(campo => {
        campo.style.border = "";
    });
}

function validarEmail(email){

    const regex =
        /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    return regex.test(email);
}
</script>

</body>
</html>
